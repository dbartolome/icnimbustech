services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-sgs_prod}
    volumes:
      - sgs_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgs_user} -d ${POSTGRES_DB:-sgs_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - sgs_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-sgs_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change_me_minio_secret}
    volumes:
      - sgs_minio_data:/data
    # Sin puertos publicados por defecto para evitar conflictos en hostinger.
    # Backend accede por red interna en http://minio:9000.
    # Si necesitas consola/API externa, publica puertos manualmente en tu entorno.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Ollama corre en servidor externo. OLLAMA_URL (env obligatoria) apunta a él.
  # No hay contenedor ollama en este stack.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sgs_user}:${POSTGRES_PASSWORD:-change_me_postgres_password}@db:5432/${POSTGRES_DB:-sgs_prod}
      REDIS_URL: redis://redis:6379/0
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sgs_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change_me_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-sgs-documentos}
      OLLAMA_URL: ${OLLAMA_URL:-http://76.13.9.183:32768}
      OLLAMA_MODEL_DEFAULT: ${OLLAMA_MODEL:-llama3.2:3b}
      SECRET_KEY: ${SECRET_KEY:-change_me_secret_key}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      IA_RESEARCH_PROVIDER: ${IA_RESEARCH_PROVIDER:-anthropic}
      IA_RESEARCH_MODEL: ${IA_RESEARCH_MODEL:-claude-sonnet-4-20250514}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:3033"]}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
    ports:
      - "${BACKEND_PORT:-8033}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8033}
        NEXT_PUBLIC_ENV: production
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8033}
      NEXT_PUBLIC_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3033}:3000"

volumes:
  sgs_db_data:
  sgs_redis_data:
  sgs_minio_data:
